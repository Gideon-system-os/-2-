<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GIDEON | DEEP SPACE RADAR</title>
    <style>
        :root {
            --bg: #020408;
            --radar-line: rgba(0, 242, 255, 0.2);
            --radar-glow: rgba(0, 242, 255, 0.03);
            --accent: #00f2ff;
            --critical: #ff3c3c;
            --warning: #ffb703;
            --stable: #34d399;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg);
            font-family: 'Courier New', Courier, monospace; color: #fff;
        }

        #radar-canvas {
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* HUD Інтерфейс військово-космічного зразка */
        .hud-overlay {
            position: absolute; padding: 30px; z-index: 10; pointer-events: none;
            width: calc(100% - 60px); height: calc(100% - 60px);
        }

        .hud-panel {
            position: absolute; background: rgba(3, 7, 18, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.3); padding: 20px;
            border-radius: 4px; backdrop-filter: blur(10px); pointer-events: auto;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        .top-left { top: 30px; left: 30px; border-left: 4px solid var(--accent); }
        .bottom-right { bottom: 30px; right: 30px; width: 380px; border-right: 4px solid var(--accent); display: none; }

        h1 { margin: 0 0 5px 0; font-size: 20px; letter-spacing: 3px; color: #fff; text-transform: uppercase; }
        .status-tag { font-size: 11px; color: var(--accent); letter-spacing: 1px; }

        /* Опис аномалії у HUD */
        .anomaly-title { color: var(--critical); font-weight: bold; font-size: 16px; margin-bottom: 10px; text-transform: uppercase; }
        .anomaly-sector { font-size: 12px; color: var(--warning); margin-bottom: 8px; font-weight: bold; }
        .anomaly-desc { font-size: 13px; color: #cbd5e1; line-height: 1.5; margin-bottom: 12px; }
        
        .metric-box {
            background: rgba(255, 60, 60, 0.1); border: 1px solid rgba(255, 60, 60, 0.3);
            padding: 12px; border-radius: 2px; font-size: 12px; line-height: 1.4; color: #fca5a5;
        }
        .metric-box b { display: block; text-transform: uppercase; font-size: 10px; color: #fff; margin-bottom: 4px; }

        /* Інструкція */
        .instruction {
            position: absolute; bottom: 30px; left: 30px; font-size: 12px;
            color: rgba(255,255,255,0.4); pointer-events: none; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<canvas id="radar-canvas"></canvas>

<div class="hud-overlay">
    <!-- Головний командний блок -->
    <div class="hud-panel top-left">
        <h1>GIDEON: QUANTUM RADAR</h1>
        <div class="status-tag">SCANNING ZVENYHORODKA DISTRICT // 47 ACTIVE NODES</div>
    </div>

    <!-- Панель детального аналізу захопленої цілі -->
    <div class="hud-panel bottom-right" id="detail-panel">
        <div class="anomaly-title" id="an-name">Завантаження...</div>
        <div class="anomaly-sector" id="an-sector">Сектор: -</div>
        <div class="anomaly-desc" id="an-desc">-</div>
        <div class="metric-box">
            <b>Критична деструкція:</b>
            <span id="an-impact">-</span>
        </div>
    </div>

    <div class="instruction">
        [СИСТЕМА]: НАВЕДІТЬ КУРСОР НА АНОМАЛІЮ ДЛЯ ЗАХОПЛЕННЯ ТЕЛЕМЕТРІЇ
    </div>
</div>

<script>
    const canvas = document.getElementById('radar-canvas');
    const ctx = canvas.getContext('2d');
    
    let centerX, centerY, maxRadius;
    let scanAngle = 0;
    let hoveredAnomaly = null;

    // Справжні координати орбіт розраховуються на основі рівня кризи (0 - повний крах, ближче до центру)
    const anomalies = [
        { id: 1, name: "Крах графіку (24-30 год)", sector: "СРПП", danger: 0.95, desc: "Фактична зміна триває більше доби. Робота в режимі доба через добу без компенсацій.", impact: "Повна фізична руйнація особового складу, критичний ризик ДТП.", angle: 0.5, size: 8 },
        { id: 2, name: "Кадровий Вакуум (Некомплект)", sector: "Превенція / СРПП", danger: 0.85, desc: "Некомплект від 30% до 50% у ключових підрозділах. Робота за двох.", impact: "Каскадне звільнення залишку працівників через навантаження.", angle: 1.8, size: 7 },
        { id: 3, name: "Паливне виснаження", sector: "Логістика", danger: 0.75, desc: "Лише 42% задоволені МТЗ. Несправний автотранспорт, відсутність базових витратних матеріалів.", impact: "Знерухомлення патрулів, ремонт техніки за власний рахунок.", angle: 3.2, size: 6 },
        { id: 4, name: "Репресивні премії", sector: "Система мотивації", danger: 0.65, desc: "38% відкрита відмова від системи. Премія використовується як батіг 'паличної системи'.", impact: "Повна ліквідація стимулів до якісного документування.", angle: 4.5, size: 6 },
        { id: 5, name: "Токсичне управління", sector: "Заступник з превенції", danger: 0.55, desc: "Низька довіра до керівництва (2.0 бали). Прямі звіти про цькування та ігнорування проблем.", impact: "Колективні скарги, внутрішній саботаж, репутаційний удар.", angle: 5.8, size: 7 },
        { id: 6, name: "Сектор Кадрів & ССОБ", sector: "Зона безпеки", danger: 0.15, desc: "Атмосфера стабільна (7-8 балів), нормований день, висока довіра.", impact: "Ризики відсутні. Зона утримання базової стабільності підрозділу.", angle: 2.5, size: 5 }
    ];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;
        maxRadius = Math.min(centerX, centerY) * 0.85;
    }
    window.addEventListener('resize', resize);
    resize();

    // Перевірка мишки на об'єктах
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        
        let found = null;
        anomalies.forEach(a => {
            // Розрахунок поточної позиції аномалії на сітці радара
            const currentRadius = maxRadius * (1 - a.danger); // Чим більша небезпека, тим ближче до центру
            const x = centerX + Math.cos(a.angle) * currentRadius;
            const y = centerY + Math.sin(a.angle) * currentRadius;
            
            const dist = Math.hypot(mx - x, my - y);
            if (dist < a.size + 10) {
                found = a;
            }
        });

        if (found) {
            hoveredAnomaly = found;
            document.getElementById('detail-panel').style.display = 'block';
            document.getElementById('an-name').innerText = found.name;
            document.getElementById('an-name').style.color = found.danger > 0.5 ? 'var(--critical)' : 'var(--stable)';
            document.getElementById('an-sector').innerText = `ЛОКАЛІЗАЦІЯ: ${found.sector}`;
            document.getElementById('an-desc').innerText = found.desc;
            document.getElementById('an-impact').innerText = found.impact;
        } else {
            hoveredAnomaly = null;
        }
    });

    function drawRadar() {
        // Очищення з невеликим шлейфом
        ctx.fillStyle = 'rgba(2, 4, 8, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. Малювання кіл зон небезпеки (Сітка радара)
        const circlesCount = 4;
        ctx.strokeStyle = 'var(--radar-line)';
        ctx.lineWidth = 1;

        for (let i = 1; i <= circlesCount; i++) {
            const r = (maxRadius / circlesCount) * i;
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
            ctx.stroke();
            
            // Текстові позначки зон
            ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
            ctx.font = '9px monospace';
            if (i === 1) ctx.fillText("CRITICAL BLACK HOLE (COLLAPSE)", centerX + 10, centerY - r + 15);
            if (i === 2) ctx.fillText("HIGH DANGER ZONE", centerX + 10, centerY - r + 15);
            if (i === 3) ctx.fillText("WARNING BUFFER", centerX + 10, centerY - r + 15);
            if (i === 4) ctx.fillText("STABLE PEAK", centerX + 10, centerY - r + 15);
        }

        // Перехрестя радара
        ctx.beginPath();
        ctx.moveTo(centerX - maxRadius, centerY); ctx.lineTo(centerX + maxRadius, centerY);
        ctx.moveTo(centerX, centerY - maxRadius); ctx.lineTo(centerX, centerY + maxRadius);
        ctx.stroke();

        // 2. Рух та малювання променя сканера
        scanAngle += 0.012;
        if (scanAngle > Math.PI * 2) scanAngle = 0;

        // Ефект градієнтного конуса сканування
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(scanAngle);
        const scanGrad = ctx.createRadialGradient(0, 0, 10, 0, 0, maxRadius);
        scanGrad.addColorStop(0, 'rgba(0, 242, 255, 0.15)');
        scanGrad.addColorStop(1, 'rgba(0, 242, 255, 0.0)');
        ctx.fillStyle = scanGrad;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, maxRadius, 0, 0.4);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // 3. Відображення аномалій (Об'єктів)
        anomalies.forEach(a => {
            // Динамічне коливання орбіти (ефект космічного об'єкта)
            a.angle += 0.001; 
            const currentRadius = maxRadius * (1 - a.danger);
            const x = centerX + Math.cos(a.angle) * currentRadius;
            const y = centerY + Math.sin(a.angle) * currentRadius;

            // Визначення кольору за рівнем небезпеки
            let color = 'var(--accent)';
            if (a.danger > 0.75) color = 'var(--critical)';
            else if (a.danger > 0.4) color = 'var(--warning)';
            else color = 'var(--stable)';

            // Пульсація об'єкта
            const pulse = Math.sin(Date.now() * 0.005 + a.id) * 3;

            // Світіння навколо аномалії
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, a.size + (hoveredAnomaly && hoveredAnomaly.id === a.id ? 4 : 0), 0, Math.PI * 2);
            ctx.fill();

            // Малювання орбітального вектору (лінія до центру)
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x, y);
            ctx.stroke();

            // Текст біля об'єкта
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.font = '10px monospace';
            ctx.fillText(`[ID-${a.id}]:${a.sector}`, x + 12, y + 4);
        });

        // 4. Епіцентр (Центральна точка тяжіння)
        ctx.shadowBlur = 20;
        ctx.shadowColor = 'var(--critical)';
        ctx.fillStyle = '#000';
        ctx.strokeStyle = 'var(--critical)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        requestAnimationFrame(drawRadar);
    }

    drawRadar();
</script>
</body>
</html>
