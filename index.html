<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GIDEON | SPATIAL WARP SINGULARITY</title>
    <style>
        :root {
            --bg-dark: #020308;
            --neon-blue: #00f2ff;
            --neon-pink: #ff0055;
            --neon-amber: #ffb703;
            --neon-emerald: #00ff88;
            --glass-bg: rgba(4, 8, 20, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-dark);
            font-family: 'Segoe UI', -apple-system, sans-serif;
            color: #fff; user-select: none;
        }

        #warp-field {
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* Кінематографічний HUD-інтерфейс */
        .hud-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; box-sizing: border-box; padding: 40px;
        }

        .cyber-card {
            background: var(--glass-bg);
            border: 1px solid rgba(0, 242, 255, 0.25);
            padding: 25px; border-radius: 12px; pointer-events: auto;
            backdrop-filter: blur(30px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 
                        inset 0 0 30px rgba(0, 242, 255, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .top-banner {
            position: absolute; top: 40px; left: 40px;
            border-left: 4px solid var(--neon-blue); padding-left: 20px;
        }

        .top-banner h1 {
            margin: 0; font-size: 22px; letter-spacing: 6px; font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
        }

        .ticker-data {
            font-size: 11px; color: var(--neon-blue); margin-top: 5px;
            font-family: monospace; letter-spacing: 2px; opacity: 0.8;
        }

        /* Висувна кругова панель дешифрування аномалій */
        .telemetry-overlay {
            position: absolute; bottom: 40px; right: 40px; width: 440px;
            border-radius: 12px; border-bottom: 4px solid var(--neon-blue);
            display: none; transform: scale(0.9) translateY(30px); opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .telemetry-overlay.active {
            display: block; transform: scale(1) translateY(0); opacity: 1;
        }

        .node-name {
            font-size: 17px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 12px; color: #fff;
        }

        .node-loc {
            font-size: 11px; color: var(--neon-amber); margin-bottom: 15px;
            font-family: monospace; letter-spacing: 2px; font-weight: bold;
        }

        .node-details {
            font-size: 13.5px; color: #94a3b8; line-height: 1.6; margin-bottom: 20px;
        }

        .forecast-panel {
            background: linear-gradient(135deg, rgba(255, 0, 85, 0.08) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid rgba(255, 0, 85, 0.25);
            padding: 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; color: #fecdd3;
        }
        
        .forecast-panel b {
            display: block; text-transform: uppercase; color: #fff; font-size: 11px;
            letter-spacing: 2px; margin-bottom: 6px; font-family: monospace;
        }

        .system-hint {
            position: absolute; bottom: 40px; left: 40px; font-size: 11px;
            color: rgba(255,255,255,0.25); letter-spacing: 2px; font-family: monospace;
        }
    </style>
</head>
<body>

<canvas id="warp-field"></canvas>

<div class="hud-layer">
    <!-- Керуючий HUD -->
    <div class="cyber-card top-banner">
        <h1>GIDEON // CORE SINGULARITY</h1>
        <div class="ticker-data">SYSTEM: SPATIAL_WARP_SCANNER // INPUT_TELEMETRY: 47_NODES</div>
    </div>

    <!-- Тактична панель аналізу аномалії -->
    <div class="cyber-card telemetry-overlay" id="info-overlay">
        <div class="node-name" id="lbl-name">ЗАХОПЛЕННЯ АНОМАЛІЇ...</div>
        <div class="node-loc" id="lbl-loc">ЛОКАЛІЗАЦІЯ: -</div>
        <div class="node-details" id="lbl-details">-</div>
        <div class="forecast-panel" id="lbl-panel-border">
            <b>ПРОГНОЗ РУЙНУВАННЯ СИСТЕМИ:</b>
            <span id="lbl-impact">-</span>
        </div>
    </div>

    <div class="system-hint">
        [MATRIX_LOG]: INTERACTIVE QUANTUM INTERACTION // NAVIGATION CURSOR TRIGGERS FIELD STABILIZATION
    </div>
</div>

<script>
    const canvas = document.getElementById('warp-field');
    const ctx = canvas.getContext('2d');

    let centerX, centerY, hoveredNode = null;
    let rotationGlobal = 0;

    // Структурування даних під радіально-кінетичну модель викривлення
    const anomalies = [
        // СРПП - максимальний рівень загрози, летить біля самого ядра (danger: 0.9)
        { id: 1, title: "Крах графіку (24-30 год)", sector: "Сектор РПП", danger: 0.88, speed: 0.035, radiusOffset: 0, desc: "Фактичне навантаження на зміну становить від 24 до 30 годин безперервної служби[cite: 1]. Зміни доба/доба без компенсацій[cite: 1].", impact: "Граничне фізичне та психологічне виснаження, критичний ризик виникнення надзвичайних подій на маршрутах[cite: 1]." },
        { id: 2, title: "Кадровий вакуум (Некомплект)", sector: "Превенція та СРПП", danger: 0.80, speed: 0.028, radiusOffset: 15, desc: "Фактичний дефіцит особового складу в ключових підрозділах сягає від 30% до 50%[cite: 1]. Кожен працює за двох[cite: 1].", impact: "Запуск незворотного циклу кадрового голоду: перевантаження провокує нові звільнення залишку штату[cite: 1]." },
        // Середня зона небезпеки (Превенція / Дізнання)
        { id: 3, title: "Репресивне преміювання", sector: "Блок мотивації", danger: 0.62, speed: 0.018, radiusOffset: 0, desc: "38% особового складу відкрито незадоволені преміями[cite: 1]. Позбавлення виплат діє за принципом репресивної планової системи[cite: 1].", impact: "Повна ліквідація стимулів та ініціативи працівників виконувати свої обов'язки якісно[cite: 1]." },
        { id: 4, name: "Паливне виснаження флоту", title: "Паливний колапс", sector: "Логістика МТЗ", danger: 0.55, speed: 0.014, radiusOffset: 20, desc: "Гостра незадоволеність МТЗ (лише 42% позитиву)[cite: 1]. Несправний автотранспорт, критична відсутність пального[cite: 1].", impact: "Падіння мобільності екіпажів, неможливість оперативного виїзду на виклики громадян[cite: 1]." },
        { id: 5, title: "Токсичний стиль управління", sector: "Керівництво превенції", danger: 0.48, speed: 0.012, radiusOffset: -10, desc: "Низький рівень довіри до безпосередніх керівників (2.0 - 2.2 з 5)[cite: 1, 2]. Фіксація фактів внутрішнього цькування особового складу[cite: 1, 2].", impact: "Колективні скарги, внутрішній прихований саботаж наказів, репутаційні втрати[cite: 1]." },
        // Зона абсолютної номінальної стабільності (Кадри / ОСБ / Моніторинг)
        { id: 6, title: "Орбіта стабільності кадрів", sector: "Кадри & ССОБ", danger: 0.18, speed: 0.004, radiusOffset: 0, desc: "Ідеальний морально-психологічний клімат в колективі (7-8 балів), нормований день, висока довіра та взаємоповага[cite: 1, 2].", impact: "Ризики деструкції системи відсутні. Базова опора стабільності підрозділу[cite: 1, 2]." }
    ];

    function resize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        centerX = canvas.width / 2; centerY = canvas.height / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // Ініціалізація орбітальних кутів для плазмоїдів
    anomalies.forEach(a => a.currentAngle = Math.random() * Math.PI * 2);

    // Інтерактивний захват аномалії курсором миші
    canvas.addEventListener('mousemove', (e) => {
        const mx = e.clientX; const my = e.clientY;
        const maxRadius = Math.min(centerX, centerY) * 0.85;
        let found = null;

        anomalies.forEach(a => {
            const orbitRadius = maxRadius * (1 - a.danger) + 60 + a.radiusOffset;
            const x = centerX + Math.cos(a.currentAngle) * orbitRadius;
            const y = centerY + Math.sin(a.currentAngle) * orbitRadius;
            
            if (Math.hypot(mx - x, my - y) < 25) {
                found = a;
            }
        });

        const overlay = document.getElementById('info-overlay');
        if (found) {
            hoveredNode = found;
            overlay.classList.add('active');
            document.getElementById('lbl-name').innerText = found.title;
            document.getElementById('lbl-loc').innerText = `ОРБІТАЛЬНИЙ СЕКТОР: ${found.sector}`;
            document.getElementById('lbl-details').innerText = found.desc;
            document.getElementById('lbl-impact').innerText = found.impact;

            const box = document.getElementById('lbl-panel-border');
            if (found.danger > 0.75) box.style.borderColor = 'var(--neon-pink)';
            else if (found.danger > 0.4) box.style.borderColor = 'var(--neon-amber)';
            else box.style.borderColor = 'var(--neon-emerald)';
        } else {
            hoveredNode = null;
            overlay.classList.remove('active');
        }
    });

    function drawWarpSimulation() {
        // Ефект глибокого космічного затухання ( Motion Blur )
        ctx.fillStyle = 'rgba(2, 3, 8, 0.18)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const maxRadius = Math.min(centerX, centerY) * 0.85;
        rotationGlobal += 0.002;

        // 1. ВЕРТРИКАЛЬНО-СВІТЛОВІ ЛІНІЇ ПРОСТОРОВОЇ СІТКИ (Голографічне викривлення)
        ctx.lineWidth = 1;
        for (let i = -6; i <= 6; i++) {
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.02)';
            ctx.beginPath();
            ctx.moveTo(centerX + i * 80, 0);
            ctx.quadraticCurveTo(centerX, centerY, centerX + i * 80, canvas.height);
            ctx.stroke();
        }

        // 2. РЕНДЕРИНГ ОРБІТАЛЬНИХ КІЛЕЦЬ СЕКТОРІВ
        anomalies.forEach(a => {
            const orbitRadius = maxRadius * (1 - a.danger) + 60 + a.radiusOffset;
            
            let orbitColor = 'rgba(0, 242, 255, 0.08)';
            if (a.danger > 0.75) orbitColor = 'rgba(255, 0, 85, 0.12)';
            else if (a.danger > 0.4) orbitColor = 'rgba(255, 183, 3, 0.1)';

            ctx.strokeStyle = orbitColor;
            ctx.lineWidth = hoveredNode && hoveredNode.id === a.id ? 2 : 1;
            
            // Малювання еліптично викривленої орбіти
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotationGlobal * (a.danger > 0.5 ? 1 : -0.5));
            ctx.beginPath();
            ctx.ellipse(0, 0, orbitRadius, orbitRadius * 0.65, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Оновлення позиції плазмоїда на орбіті (швидкість шалена біля ядра)[cite: 1, 2]
            if (!hoveredNode || hoveredNode.id !== a.id) {
                a.currentAngle += a.speed;
            }

            const x = centerX + Math.cos(a.currentAngle) * orbitRadius;
            const y = centerY + Math.sin(a.currentAngle) * (orbitRadius * 0.65); // Синхронізація з еліпсом

            // Визначення колірної матриці плазмоїда
            let nodeColor = 'var(--neon-blue)';
            if (a.danger > 0.75) nodeColor = 'var(--neon-pink)';
            else if (a.danger > 0.4) nodeColor = 'var(--neon-amber)';
            else nodeColor = 'var(--neon-emerald)';

            // Малювання променя зв'язку з чорною дірою, якщо об'єкт під курсором
            if (hoveredNode && hoveredNode.id === a.id) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 8]);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Малювання плазмоїда (Квантового згустку загрози)
            ctx.save();
            ctx.shadowBlur = hoveredNode && hoveredNode.id === a.id ? 25 : 12;
            ctx.shadowColor = nodeColor;
            ctx.fillStyle = nodeColor;
            ctx.beginPath();
            ctx.arc(x, y, hoveredNode && hoveredNode.id === a.id ? 10 : 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Додаткове зовнішнє кільце плазмоїда
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(x, y, hoveredNode && hoveredNode.id === a.id ? 16 : 10, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Текстовий тег біля плазмоїда
            ctx.fillStyle = hoveredNode && hoveredNode.id === a.id ? '#fff' : 'rgba(255,255,255,0.4)';
            ctx.font = 'bold 10px monospace';
            ctx.fillText(`[⚡_${a.sector.split(' ')[0].toUpperCase()}]`, x + 18, y + 4);
        });

        // 3. ЦЕНТРАЛЬНЕ СИНГУЛЯРНЕ ЯДРО КОЛАПСУ (Чорна діра РВП)
        ctx.save();
        const pulseCore = Math.sin(Date.now() * 0.005) * 6;
        ctx.shadowBlur = 30 + pulseCore;
        ctx.shadowColor = 'var(--neon-pink)';
        
        // Малювання градієнтної воронки ядра
        const coreGrad = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 50 + pulseCore);
        coreGrad.addColorStop(0, '#000000');
        coreGrad.addColorStop(0.3, '#0b0205');
        coreGrad.addColorStop(0.7, 'rgba(255, 0, 85, 0.2)');
        coreGrad.addColorStop(1, 'rgba(0,0,0,0)');
        
        ctx.fillStyle = coreGrad;
        ctx.beginPath();
        ctx.arc(centerX, centerY, 60 + pulseCore, 0, Math.PI * 2);
        ctx.fill();
        
        // Чітка межа горизонту подій
        ctx.strokeStyle = 'var(--neon-pink)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(centerX, centerY, 20 + pulseCore * 0.3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        requestAnimationFrame(drawWarpSimulation);
    }

    drawWarpSimulation();
</script>
</body>
</html>
