<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GIDEON | CASCADE OVERLOAD STACK</title>
    <style>
        :root {
            --bg-deep: #02050a;
            --panel-bg: rgba(6, 11, 25, 0.85);
            --accent-cyan: #00f2ff;
            --accent-gold: #ffb703;
            --critical-red: #ff2a5f;
            --stable-green: #10b981;
            --border-line: rgba(0, 242, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-deep);
            font-family: 'Consolas', 'Courier New', monospace; color: #fff;
        }

        #canvas-layer {
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* HUD Елементи управління військово-корабельного типу */
        .hud-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            box-sizing: border-box; padding: 35px;
        }

        .hud-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.25);
            padding: 20px; border-radius: 4px; pointer-events: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,242,255,0.05);
            backdrop-filter: blur(12px);
        }

        .header-panel {
            position: absolute; top: 35px; left: 35px; border-left: 4px solid var(--accent-cyan);
        }

        .header-panel h1 {
            margin: 0; font-size: 22px; letter-spacing: 4px; font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .system-status {
            font-size: 11px; color: var(--accent-cyan); margin-top: 5px; letter-spacing: 2px;
        }

        /* Права бічна панель для виведення детальної інженерної телеметрії */
        .telemetry-panel {
            position: absolute; top: 35px; right: 35px; width: 400px;
            border-top: 4px solid var(--accent-cyan); display: none;
        }

        .telemetry-title {
            font-size: 14px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 15px; color: #fff;
        }

        .telemetry-meta {
            font-size: 11px; color: var(--accent-gold); margin-bottom: 10px; letter-spacing: 1px;
        }

        .telemetry-desc {
            font-size: 13px; color: #9ca3af; line-height: 1.6; margin-bottom: 15px;
        }

        .diagnostic-box {
            background: rgba(255, 42, 95, 0.08); border: 1px solid rgba(255, 42, 95, 0.3);
            padding: 15px; border-radius: 3px; font-size: 12px; line-height: 1.5; color: #fca5a5;
        }
        .diagnostic-box b {
            display: block; text-transform: uppercase; color: #fff; font-size: 10px;
            letter-spacing: 1px; margin-bottom: 5px;
        }

        .footer-hint {
            position: absolute; bottom: 35px; left: 35px; font-size: 11px;
            color: rgba(255,255,255,0.3); letter-spacing: 1px;
        }
    </style>
</head>
<body>

<canvas id="canvas-layer"></canvas>

<div class="hud-container">
    <!-- Головне вікно системи GIDEON -->
    <div class="hud-panel header-panel">
        <h1>GIDEON // CASCADE OVERLOAD STACK</h1>
        <div class="system-status">SYS_STATUS: CRITICAL_THERMAL_DETECTED // SAMPLE: 47 NODES</div>
    </div>

    <!-- Вікно телеметрії конкретної аномалії (блоку стеку) -->
    <div class="hud-panel telemetry-panel" id="telemetry-box">
        <div class="telemetry-title" id="tel-title">НАЗВА ЗАГРОЗИ</div>
        <div class="telemetry-meta" id="tel-sector">ПІДРОЗДІЛ: -</div>
        <div class="telemetry-desc" id="tel-desc">Опис...</div>
        <div class="diagnostic-box">
            <b>МАТРИЦЯ ДЕСТРУКТИВНИХ НАСЛІДКІВ:</b>
            <span id="tel-impact">-</span>
        </div>
    </div>

    <div class="footer-hint">
        [COMMAND LOG]: НАВЕДІТЬ МИШКУ НА БЛОК СТЕКУ ДЛЯ ЗАХОПЛЕННЯ ТЕЛЕМЕТРІЇ РЕАКТОРА
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas-layer');
    const ctx = canvas.getContext('2d');

    // Налаштування структури даних на основі аналізу анкет особового складу
    const sectors = [
        {
            name: "Сектор РПП (СРПП)",
            code: "SRPP",
            load: 1.48, // Перевантаження 148%
            status: "CRITICAL",
            blocks: [
                { title: "Графік добових змін (24-30 год)", desc: "Фактичний час безперервного перебування на службі становить до 30 годин. Зміни доба через добу[cite: 1, 2].", impact: "Повне фізичне та психологічне виснаження, критична втрата концентрації на маршрутах патрулювання." },
                { title: "Кадровий вакуум штату", desc: "Фактичний некомплект особового складу в секторі досягає 50%[cite: 1, 2]. Навантаження розподіляється за двох-трьох працівників[cite: 1].", impact: "Створення замкненого кола (Decompression Loop) — люди звільняються через тиск, що змушує йти наступних[cite: 1]." },
                { title: "Токсичний стиль управління", desc: "Низький індекс довіри до першого керівника підрозділу (2.2 з 5)[cite: 1, 2]. Скарги на цькування[cite: 1, 2].", impact: "Руйнація субординації, внутрішній прихований саботаж наказів, колективні скарги[cite: 1]." },
                { title: "Паливне виснаження", desc: "Жорсткий ліміт або повна відсутність ПММ для патрульних автомобілів[cite: 1, 2]. Ремонт за власні кошти[cite: 1].", impact: "Знерухомлення екіпажів, неможливість оперативного реагування на виклики «102»[cite: 1]." }
            ]
        },
        {
            name: "Відділ превенції",
            code: "PREV",
            load: 1.15, // Перевантаження 115%
            status: "WARNING",
            blocks: [
                { title: "Перевантаження задачами", desc: "Робочий день триває 12-24 години[cite: 1]. Постійна наявність понаднормової роботи без компенсацій[cite: 1].", impact: "Масовий запит на переведення в інші територіальні підрозділи або звільнення[cite: 1]." },
                { title: "Деструктивне преміювання", desc: "38% опитаних активно критикують премії[cite: 1]. Система використовується як каральний інструмент 'паличної системи'[cite: 1].", impact: "Абсолютна ліквідація стимулів працювати на якісний результат[cite: 1]." },
                { title: "Мобілізаційний тиск", desc: "Постійне залучення до мобілізаційних заходів разом із ТЦК[cite: 1]. Втрата довіри населення[cite: 1].", impact: "Падіння авторитету поліції та глибока внутрішня демотивація офіцерів зі стажем понад 10 років[cite: 1]." }
            ]
        },
        {
            name: "Слідчий відділ / Дізнання",
            code: "INVEST",
            load: 0.85, 
            status: "WARNING",
            blocks: [
                { title: "Напруженість в колективі", desc: "Атмосфера оцінюється як напружена. Фіксуються внутрішні конфлікти між службами[cite: 1, 2].", impact: "Гальмування досудових розслідувань, несвоєчасне виконання процесуальних доручень[cite: 2]." },
                { title: "Некомплект слідчих нод", desc: "Брак кваліфікованих кадрів, що призводить до накопичення матеріалів у залишку штату[cite: 1, 2].", impact: "Процесуальні порушення строків, падіння якості документування злочинів[cite: 1]." }
            ]
        },
        {
            name: "Сектор кримінальної поліції",
            code: "CRIM",
            load: 0.60,
            status: "STABLE",
            blocks: [
                { title: "Високе оперативне навантаження", desc: "Робочий час становить в середньому 11-13 годин на добу[cite: 2]. Робота у вихідні дні[cite: 1].", impact: "Поступове накопичення втоми, запити на підвищення заробітної плати[cite: 1]." }
            ]
        },
        {
            name: "Кадри / Моніторинг / ССОБ",
            code: "HQ_STABLE",
            load: 0.20, // Стабільна зона
            status: "NOMINAL",
            blocks: [
                { title: "Зона температурного комфорту", desc: "Ідеальна атмосфера (7-8 балів)[cite: 1, 2]. Нормований день, високий рівень взаємоповаги та підтримки[cite: 1, 2].", impact: "Ризики відсутні. Опора внутрішньої стабільності РВП[cite: 1, 2]." }
            ]
        }
    ];

    let hoveredBlock = null;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Обробка координат мишки для точного захвату блоку всередині стеку
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const startX = 80;
        const startY = canvas.height - 120;
        const stackWidth = (canvas.width - 160 - (sectors.length - 1) * 40) / sectors.length;
        const blockHeight = 65;
        const blockGap = 8;

        let found = null;

        sectors.forEach((sec, sIdx) => {
            const x = startX + sIdx * (stackWidth + 40);
            sec.blocks.forEach((blk, bIdx) => {
                const y = startY - bIdx * (blockHeight + blockGap) - blockHeight;

                if (mx >= x && mx <= x + stackWidth && my >= y && my <= y + blockHeight) {
                    found = { sector: sec, block: blk };
                }
            });
        });

        if (found) {
            hoveredBlock = found;
            const box = document.getElementById('telemetry-box');
            box.style.display = 'block';
            document.getElementById('tel-title').innerText = found.block.title;
            document.getElementById('tel-sector').innerText = `РЕАКТОРНИЙ СЕКТОР: ${found.sector.name} [${found.sector.code}]`;
            document.getElementById('tel-desc').innerText = found.block.desc;
            document.getElementById('tel-impact').innerText = found.block.impact;

            // Зміна кольору заголовку поп-апу відповідно до рівня загрози
            if (found.sector.status === "CRITICAL") box.style.borderTopColor = 'var(--critical-red)';
            else if (found.sector.status === "WARNING") box.style.borderTopColor = 'var(--accent-gold)';
            else box.style.borderTopColor = 'var(--stable-green)';
        } else {
            hoveredBlock = null;
        }
    });

    function drawStackEngine() {
        // Очищення екрана та створення ефекту глибокого кінетичного шлейфу
        ctx.fillStyle = 'rgba(2, 5, 10, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Малювання фонової цифрової сітки
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.03)';
        ctx.lineWidth = 1;
        const gridSize = 40;
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        const startX = 80;
        const startY = canvas.height - 120;
        // Динамічний розрахунок ширини стовпців під будь-який монітор
        const stackWidth = (canvas.width - 160 - (sectors.length - 1) * 40) / sectors.length;
        const blockHeight = 65;
        const blockGap = 8;

        sectors.forEach((sec, sIdx) => {
            const x = startX + sIdx * (stackWidth + 40);
            
            // Визначення кольорової гами стовпця реактора
            let secColor = 'var(--accent-cyan)';
            if (sec.status === "CRITICAL") secColor = 'var(--critical-red)';
            else if (sec.status === "WARNING") secColor = 'var(--accent-gold)';
            else if (sec.status === "NOMINAL") secColor = 'var(--stable-green)';

            // Малювання інженерної шахти реактора (оболонка стовпця)
            const totalShaftHeight = (blockHeight + blockGap) * 4 + 15;
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.fillStyle = 'rgba(6, 11, 25, 0.3)';
            ctx.lineWidth = 1;
            ctx.fillRect(x - 10, startY - totalShaftHeight, stackWidth + 20, totalShaftHeight);
            ctx.strokeRect(x - 10, startY - totalShaftHeight, stackWidth + 20, totalShaftHeight);

            // Текстова інформація знизу під кожним реактором
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px monospace';
            ctx.fillText(sec.code, x, startY + 25);
            
            ctx.font = '9px monospace';
            ctx.fillStyle = secColor;
            ctx.fillText(`LOAD: ${(sec.load * 100).toFixed(0)}%`, x, startY + 42);
            ctx.fillText(`STATUS: ${sec.status}`, x, startY + 54);

            // Рендеринг кінетичних блоків усередині стеку
            sec.blocks.forEach((blk, bIdx) => {
                const y = startY - bIdx * (blockHeight + blockGap) - blockHeight;
                const isHovered = hoveredBlock && hoveredBlock.block.title === blk.title;

                // Ефект глічу (перешкод) для критично перевантажених зон (наприклад СРПП)
                let glitchOffset = 0;
                if (sec.status === "CRITICAL" && Math.random() > 0.96) {
                    glitchOffset = (Math.random() - 0.5) * 7;
                }

                // Заливка блоку
                ctx.fillStyle = isHovered ? 'rgba(255,255,255,0.15)' : 'rgba(11, 22, 44, 0.85)';
                ctx.fillRect(x + glitchOffset, y, stackWidth, blockHeight);

                // Контур блоку зі світінням, якщо система критична
                ctx.strokeStyle = isHovered ? '#fff' : secColor;
                ctx.lineWidth = isHovered ? 2 : 1;
                
                if (sec.status === "CRITICAL" && !isHovered) {
                    ctx.shadowBlur = Math.sin(Date.now() * 0.007) * 8 + 10;
                    ctx.shadowColor = varProp = 'var(--critical-red)';
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.strokeRect(x + glitchOffset, y, stackWidth, blockHeight);
                ctx.shadowBlur = 0; // Скидання тіні

                // Декоративні кутові тактичні засічки на кожному блоці
                ctx.fillStyle = secColor;
                ctx.fillRect(x + glitchOffset, y, 4, 4);
                ctx.fillRect(x + glitchOffset + stackWidth - 4, y, 4, 4);
                ctx.fillRect(x + glitchOffset, y + blockHeight - 4, 4, 4);
                ctx.fillRect(x + glitchOffset + stackWidth - 4, y + blockHeight - 4, 4, 4);

                // Обрізання тексту всередині блоку
                ctx.fillStyle = isHovered ? '#fff' : '#e5e7eb';
                ctx.font = 'bold 11px monospace';
                
                // Форматування довгого тексту під ширину стовпця
                const maxTextWidth = stackWidth - 20;
                let text = blk.title.toUpperCase();
                if (ctx.measureText(text).width > maxTextWidth) {
                    while (ctx.measureText(text + '...').width > maxTextWidth) {
                        text = text.slice(0, -1);
                    }
                    text += '...';
                }
                ctx.fillText(text, x + 10 + glitchOffset, y + 35);
            });
        });

        requestAnimationFrame(drawStackEngine);
    }

    drawStackEngine();
</script>
</body>
</html>
